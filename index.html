<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>EAGLE VIEW // LIVE</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">

<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#030912;
  --panel:rgba(3,10,24,0.97);
  --border:rgba(0,200,255,0.13);
  --cyan:#00d4ff;
  --green:#00ff99;
  --amber:#ffb300;
  --purple:#bb55ff;
  --red:#ff3355;
  --dim:rgba(255,255,255,0.25);
  --font-head:'Orbitron',monospace;
  --font-mono:'Share Tech Mono',monospace;
}
html,body{height:100%;overflow:hidden;background:var(--bg);font-family:var(--font-mono);color:var(--cyan);}
#map{position:fixed;inset:0;width:100%;height:100%;}

/* ── SCANLINES ── */
#map::after{content:'';position:fixed;inset:0;pointer-events:none;z-index:1;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.08) 2px,rgba(0,0,0,0.08) 4px);}

/* ── HEADER ── */
#hdr{position:fixed;top:0;left:0;right:0;z-index:100;height:52px;
  background:var(--panel);border-bottom:1px solid var(--border);
  display:flex;align-items:center;padding:0 16px;gap:16px;}
#logo{font-family:var(--font-head);font-size:18px;font-weight:900;
  color:#fff;letter-spacing:4px;text-shadow:0 0 20px var(--cyan);}
#logo span{color:var(--cyan);}
.live-badge{background:var(--red);color:#fff;font-size:9px;font-family:var(--font-head);
  padding:2px 6px;letter-spacing:2px;animation:blink 1.4s infinite;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:0.4;}}
.hdr-stats{display:flex;gap:12px;margin-left:auto;}
.hs{display:flex;flex-direction:column;align-items:center;min-width:50px;}
.hs-v{font-size:15px;font-weight:700;line-height:1;}
.hs-v.f{color:var(--green);}
.hs-v.sat{color:var(--purple);}
.hs-l{font-size:8px;color:var(--dim);letter-spacing:1px;margin-top:2px;}
#utc{font-size:10px;color:var(--dim);letter-spacing:1px;}
#status{font-size:9px;color:var(--cyan);letter-spacing:1px;opacity:0.7;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:200px;}
#hamburger{display:none;background:none;border:none;color:var(--cyan);font-size:22px;cursor:pointer;padding:4px 8px;margin-left:8px;}

/* ── SIDEBAR ── */
#sidebar{position:fixed;top:52px;left:0;bottom:0;width:220px;z-index:99;
  background:var(--panel);border-right:1px solid var(--border);
  display:flex;flex-direction:column;padding:12px 10px;gap:6px;overflow-y:auto;}
#sidebar-overlay{display:none;position:fixed;inset:0;z-index:98;background:rgba(0,0,0,0.6);}

.sec-label{font-size:9px;color:var(--dim);letter-spacing:2px;padding:4px 4px 2px;border-top:1px solid var(--border);margin-top:4px;}
.sec-label:first-child{border-top:none;margin-top:0;}

.lbtn{width:100%;background:rgba(0,200,255,0.04);border:1px solid var(--border);
  color:rgba(0,212,255,0.5);font-family:var(--font-mono);font-size:11px;
  padding:8px 10px;cursor:pointer;display:flex;align-items:center;gap:8px;
  transition:all 0.2s;letter-spacing:1px;border-radius:2px;}
.lbtn:hover{background:rgba(0,200,255,0.1);color:var(--cyan);}
.lbtn.on{background:rgba(0,200,255,0.08);border-color:rgba(0,200,255,0.4);color:var(--cyan);}
.lsym{font-size:13px;width:18px;text-align:center;flex-shrink:0;line-height:1;}

/* Style switcher */
.style-row{display:grid;grid-template-columns:1fr 1fr;gap:4px;}
.sbtn{background:rgba(0,200,255,0.04);border:1px solid var(--border);
  color:rgba(0,212,255,0.5);font-family:var(--font-mono);font-size:9px;
  padding:5px;cursor:pointer;transition:all 0.2s;letter-spacing:1px;border-radius:2px;}
.sbtn:hover,.sbtn.on{background:rgba(0,200,255,0.12);color:var(--cyan);border-color:rgba(0,200,255,0.5);}

/* Satellite legend */
#sat-legend{font-size:9px;padding:4px;display:none;}
#sat-legend.show{display:block;}
.sl-row{display:flex;align-items:center;gap:6px;padding:2px 0;}
.sl-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}

/* Bottom buttons */
.bot-btns{display:flex;gap:6px;margin-top:auto;padding-top:8px;}
.bb{flex:1;background:rgba(0,200,255,0.06);border:1px solid var(--border);
  color:var(--dim);font-family:var(--font-mono);font-size:9px;padding:6px;
  cursor:pointer;letter-spacing:1px;border-radius:2px;}
.bb:hover{color:var(--cyan);border-color:rgba(0,200,255,0.4);}

/* Live feed */
#feed{flex:1;overflow-y:auto;min-height:60px;max-height:200px;}
.fi{display:flex;flex-direction:column;padding:4px 0;border-bottom:1px solid rgba(0,200,255,0.06);}
.fi-cs{font-size:10px;font-weight:700;}
.fi-dt{font-size:9px;color:var(--dim);}
.fi.f .fi-cs{color:var(--green);}
.fi.sat .fi-cs{color:var(--purple);}
.fi.emb .fi-cs{color:#44aaff;}
.fi.cia .fi-cs{color:#ff44aa;}
.fi.wh .fi-cs{color:#ffff44;}

/* ── HUD ── */
#hud{position:fixed;bottom:12px;right:12px;z-index:100;
  background:var(--panel);border:1px solid var(--border);
  padding:8px 12px;font-size:10px;color:var(--dim);letter-spacing:1px;text-align:right;}
#coords{color:var(--cyan);}
#last-update{font-size:9px;}

/* ── TOAST ── */
#toast{position:fixed;bottom:60px;left:50%;transform:translateX(-50%);
  background:rgba(255,50,80,0.9);color:#fff;padding:8px 16px;
  font-size:11px;letter-spacing:1px;z-index:200;display:none;border-radius:2px;}

/* ── MAPBOX POPUP ── */
.mapboxgl-popup-content{
  background:rgba(3,10,24,0.97)!important;
  border:1px solid rgba(0,200,255,0.3)!important;
  color:var(--cyan)!important;
  font-family:var(--font-mono)!important;
  font-size:11px!important;
  padding:10px 14px!important;
  border-radius:2px!important;
  min-width:180px;
}
.mapboxgl-popup-tip{border-top-color:rgba(0,200,255,0.3)!important;border-bottom-color:rgba(0,200,255,0.3)!important;}
.mapboxgl-popup-close-button{color:var(--cyan)!important;font-size:16px!important;}
.pop-title{font-family:var(--font-head);font-size:12px;font-weight:700;margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid rgba(0,200,255,0.2);}
.pop-row{display:flex;justify-content:space-between;gap:16px;padding:2px 0;}
.pop-k{color:var(--dim);font-size:9px;letter-spacing:1px;}
.pop-v{font-size:10px;text-align:right;}

/* ── MOBILE ── */
@media(max-width:700px){
  #hamburger{display:block;}
  #sidebar{transform:translateX(-100%);transition:transform 0.25s;}
  #sidebar.open{transform:translateX(0);}
  #sidebar-overlay.show{display:block;}
  #status{display:none;}
  #hdr{gap:8px;}
}
</style>
</head>
<body>
<div id="map"></div>
<div id="sidebar-overlay" onclick="closeSidebar()"></div>

<!-- HEADER -->
<div id="hdr">
  <button id="hamburger" onclick="toggleSidebar()">☰</button>

  <div class="live-badge">LIVE</div>
  <div id="status">INITIALIZING...</div>
  <div class="hdr-stats">
    <div class="hs"><div class="hs-v f" id="fc">—</div><div class="hs-l">MIL AIRCRAFT</div></div>
    <div class="hs"><div class="hs-v sat" id="sc">—</div><div class="hs-l">SATELLITES</div></div>
  </div>
  <div id="utc">--:--:-- UTC</div>
</div>

<!-- SIDEBAR -->
<div id="sidebar">
  <div class="sec-label">// LAYERS</div>
  <button class="lbtn on" id="lb-f"   onclick="toggleLayer('f')"  ><span class="lsym" style="color:#00ff99;">✈</span>MIL AIRCRAFT</button>
  <button class="lbtn on" id="lb-sat" onclick="toggleLayer('sat')" ><span class="lsym" style="color:#bb55ff;">●</span>SATELLITES</button>
  <button class="lbtn"    id="lb-nuc" onclick="toggleLayer('nuc')" ><span class="lsym" style="color:#ffff00;">☢</span>NUCLEAR</button>
  <button class="lbtn"    id="lb-rad" onclick="toggleLayer('rad')" ><span class="lsym" style="color:#ff2200;">📡</span>RADAR SITES</button>
  <button class="lbtn"    id="lb-mil" onclick="toggleLayer('mil')" ><span class="lsym" style="color:#00ff99;">★</span>MIL BASES</button>
  <button class="lbtn"    id="lb-emb" onclick="toggleLayer('emb')" ><span class="lsym" style="color:#44aaff;">🏛</span>EMBASSIES</button>
  <button class="lbtn"    id="lb-cia" onclick="toggleLayer('cia')" ><span class="lsym" style="color:#ff44aa;">▣</span>CIA / INTEL</button>
  <button class="lbtn"    id="lb-wh"  onclick="toggleLayer('wh')"  ><span class="lsym" style="color:#ffff44;">⬟</span>WHITE HOUSE</button>

  <div class="sec-label">// MAP STYLE</div>
  <div class="style-row">
    <button class="sbtn on" id="sb-dark"      onclick="setStyle('dark')"     >DARK</button>
    <button class="sbtn"    id="sb-satellite" onclick="setStyle('satellite')" >SATELLITE</button>
    <button class="sbtn"    id="sb-terrain"   onclick="setStyle('terrain')"   >TERRAIN</button>
    <button class="sbtn"    id="sb-street"    onclick="setStyle('street')"    >STREET</button>
  </div>

  <div class="sec-label">// SATELLITES</div>
  <div id="sat-legend" class="show">
    <div class="sl-row"><div class="sl-dot" style="background:#00bbff"></div><span>USA MIL · STARSHIELD</span></div>
    <div class="sl-row"><div class="sl-dot" style="background:#ff6633"></div><span>KOSMOS · BARS-M</span></div>
    <div class="sl-row"><div class="sl-dot" style="background:#ffaa00"></div><span>YAOGAN · JILIN-1</span></div>
  </div>

  <div class="sec-label">// LIVE FEED</div>
  <div id="feed"></div>

  <div class="bot-btns">
    <button class="bb" onclick="doRefresh()">↺ REFRESH</button>
    <button class="bb" onclick="doReset()">⊙ RESET</button>
  </div>
</div>

<!-- HUD -->
<div id="hud">
  <div id="coords">LAT — LON —</div>
  <div id="last-update">LAST UPDATE: —</div>
</div>
<div id="toast"></div>

function setLU(){ $('last-update').textContent='LAST UPDATE: '+new Date().toUTCString().slice(17,25)+' UTC'; }
function feed(cls,cs,detail){
  var d=document.createElement('div'); d.className='fi '+cls;
  d.innerHTML='<div class="fi-cs">'+cs+'</div><div class="fi-dt">'+detail+'</div>';
  var f=$('feed'); f.insertBefore(d,f.firstChild);
  while(f.children.length>30) f.removeChild(f.lastChild);
}

// UTC clock
setInterval(function(){
  $('utc').textContent = new Date().toUTCString().slice(17,25)+' UTC';
},1000);

// ── MOBILE SIDEBAR ────────────────────────────────────────────────────────────
function toggleSidebar(){
  var s=$('sidebar'), o=$('sidebar-overlay');
  s.classList.toggle('open'); o.classList.toggle('show');
}
function closeSidebar(){
  $('sidebar').classList.remove('open');
  $('sidebar-overlay').classList.remove('show');
}

// ── MAPBOX INIT ───────────────────────────────────────────────────────────────
mapboxgl.accessToken = MAPBOX_TOKEN;

var map = new mapboxgl.Map({
  container: 'map',
  style: 'mapbox://styles/mapbox/dark-v11',
  projection: 'globe',
  center: [10, 20],
  zoom: 2,
  minZoom: 1.5,
});

map.addControl(new mapboxgl.NavigationControl({showCompass:true}), 'top-right');

// Atmosphere + stars on globe
map.on('style.load', function(){
  map.setFog({
    color: 'rgb(2,8,20)',
    'high-color': 'rgb(0,20,50)',
    'horizon-blend': 0.03,
    'space-color': 'rgb(1,4,12)',
    'star-intensity': 0.8
  });
  // Re-render all active layers after style change
  refreshAllMarkers();
});

// Coords HUD
map.on('mousemove', function(e){
  $('coords').textContent = 'LAT '+e.lngLat.lat.toFixed(3)+'° LON '+e.lngLat.lng.toFixed(3)+'°';
});

// ── MAP STYLE SWITCHER ────────────────────────────────────────────────────────
var STYLES = {
  dark:      'mapbox://styles/mapbox/dark-v11',
  satellite: 'mapbox://styles/mapbox/satellite-streets-v12',
  terrain:   'mapbox://styles/mapbox/outdoors-v12',
  street:    'mapbox://styles/mapbox/streets-v12',
};
function setStyle(s){
  map.setStyle(STYLES[s]);
  document.querySelectorAll('.sbtn').forEach(function(b){ b.classList.remove('on'); });
  $('sb-'+s).classList.add('on');
}

// ── MARKER MANAGEMENT ─────────────────────────────────────────────────────────
// Store all markers by layer
var markerStore = { f:[], sat:[], nuc:[], rad:[], mil:[], emb:[], cia:[], wh:[] };
var vis = { f:true, sat:true, nuc:false, rad:false, mil:false, emb:false, cia:false, wh:false };

function addMarker(layer, lngLat, el, popupHTML) {
  var popup = new mapboxgl.Popup({offset:12, maxWidth:'280px'})
    .setHTML(popupHTML);
  var marker = new mapboxgl.Marker({element: el})
    .setLngLat(lngLat)
    .setPopup(popup);
  if (vis[layer]) marker.addTo(map);
  markerStore[layer].push(marker);
  return marker;
}

function clearLayer(layer) {
  markerStore[layer].forEach(function(m){ m.remove(); });
  markerStore[layer] = [];
}

function toggleLayer(layer) {
  vis[layer] = !vis[layer];
  var btn = $('lb-'+layer);
  btn.classList.toggle('on', vis[layer]);
  if (vis[layer]) {
    markerStore[layer].forEach(function(m){ m.addTo(map); });
    if (layer === 'sat') $('sat-legend').classList.add('show');
  } else {
    markerStore[layer].forEach(function(m){ m.remove(); });
    if (layer === 'sat') $('sat-legend').classList.remove('show');
  }
}

// ── MARKER ELEMENTS ───────────────────────────────────────────────────────────
function mkPlaneEl(color, heading) {
  var el = document.createElement('div');
  el.style.cssText = 'font-size:14px;line-height:1;cursor:pointer;transform:rotate('+heading+'deg);filter:drop-shadow(0 0 3px '+color+');color:'+color+';font-family:monospace;user-select:none;';
  el.textContent = '✈';
  return el;
}

function mkDotEl(color, size) {
  var el = document.createElement('div');
  size = size || 8;
  el.style.cssText = 'width:'+size+'px;height:'+size+'px;border-radius:50%;background:'+color+';box-shadow:0 0 6px '+color+';cursor:pointer;border:1px solid rgba(255,255,255,0.3);';
  return el;
}

function mkSymEl(color, glyph, size) {
  var el = document.createElement('div');
  el.style.cssText = 'font-size:'+(size||11)+'px;line-height:1;cursor:pointer;color:'+color+';font-family:monospace;text-shadow:0 0 4px '+color+';user-select:none;white-space:nowrap;';
  el.textContent = glyph;
  return el;
}

function mkPop(color, title, rows) {
  var html = '<div class="pop-title" style="color:'+color+'">'+title+'</div>';
  rows.forEach(function(r){
    html += '<div class="pop-row"><span class="pop-k">'+r[0]+'</span><span class="pop-v" style="color:'+color+'">'+r[1]+'</span></div>';
  });
  return html;
}

function isMilitary(icao24, callsign) {
  var hex = (icao24||'').toLowerCase().trim();
  var cs  = (callsign||'').toUpperCase().trim();
  for (var i=0; i<MIL_ICAO_PREFIXES.length; i++) {
    if (hex.startsWith(MIL_ICAO_PREFIXES[i])) return true;
  }
  for (var j=0; j<MIL_CALLSIGNS.length; j++) {
    if (cs.startsWith(MIL_CALLSIGNS[j])) return true;
  }
  if (/^CG\d/.test(cs)) return true;   // Coast Guard
  if (/^AF[12]/.test(cs)) return true; // Air Force One/Two
  return false;
}


function getMilType(callsign) {
  var cs = (callsign||'').toUpperCase();
  if (/FORTE|OLIVE|SPRY|JAKE|DRAGON/.test(cs)) return 'ISR/SIGINT';
  if (/QUID|VANCE|INDY/.test(cs))              return 'Tanker';
  if (/SPOOKY|SLAYER/.test(cs))                return 'Gunship';
  if (/^SAM\d|^SPAR\d|^AF[12]|EXEC/.test(cs)) return 'VIP Transport';
  if (/^CG\d/.test(cs))                        return 'Coast Guard';
  if (/^NAVY|^NAVAL/.test(cs))                 return 'US Navy';
  if (/^USMC/.test(cs))                        return 'USMC';
  if (/JANET/.test(cs))                        return 'Special Mission';
  if (/^RCH|^CNV/.test(cs))                   return 'AMC Airlift';
  return 'Military';
}

async function loadFlights() {
  setSt('SCANNING FOR MILITARY AIRCRAFT...');
  try {
    var data = null;
    var openSkyUrl = 'https://opensky-network.org/api/states/all';

    // Netlify proxy first
    try {
      var rn = await fetch('/api/opensky');
      if (rn.ok) { data = await rn.json(); }
    } catch(e) {}

    // Fallbacks
    if (!data || !data.states) {
      var proxies = [
        'https://corsproxy.io/?' + encodeURIComponent(openSkyUrl),
        'https://api.allorigins.win/raw?url=' + encodeURIComponent(openSkyUrl),
      ];
      for (var pi=0; pi<proxies.length; pi++) {
        try {
          var rp = await fetch(proxies[pi]);
          if (rp.ok) {
            var txt = await rp.text();
            var parsed = JSON.parse(txt);
            data = parsed.contents ? JSON.parse(parsed.contents) : parsed;
            if (data && data.states) break;
          }
        } catch(e) {}
      }
    }

    if (!data || !data.states) throw new Error('All sources failed');

    clearLayer('f');
    var states = (data.states||[]).filter(function(s){ return s[5]!=null&&s[6]!=null; });
    var mil = states.filter(function(s){ return isMilitary(s[0], s[1]); });

    mil.forEach(function(s) {
      var icao=s[0], cs=(s[1]||'').trim(), country=s[2];
      var lon=s[5], lat=s[6], vel=s[9], trk=s[10];
      var callsign=(cs||icao||'?');
      var hdg=Math.round(trk||0);
      var spd=vel?Math.round(vel*1.944)+'kts':'?';
      var alt=s[7]?Math.round(s[7]*3.281).toLocaleString()+'ft':'?';
      var mtype=getMilType(callsign);
      var col = mtype==='ISR/SIGINT'    ? '#ff44ff'
              : mtype==='Tanker'        ? '#44ffff'
              : mtype==='VIP Transport' ? '#ffff44'
              : mtype==='Gunship'       ? '#ff4400'
              : mtype==='Coast Guard'   ? '#ff8800'
              : '#00ff99';
      var el = mkPlaneEl(col, hdg);
      var popup = mkPop(col, '✈ '+callsign, [
        ['TYPE',    mtype],
        ['COUNTRY', country||'?'],
        ['SPEED',   spd],
        ['HEADING', hdg+'°'],
        ['ALT',     alt],
        ['ICAO24',  icao],
      ]);
      addMarker('f', [lon, lat], el, popup);
    });

    var n = mil.length;
    $('fc').textContent = n||'0';
    setSt('TRACKING '+n+' MILITARY AIRCRAFT');
    mil.slice(0,6).forEach(function(s){
      var cs=(s[1]||s[0]||'?').trim();
      feed('f','✈ '+cs, getMilType(cs)+' · '+(s[2]||'?'));
    });
    if (n===0) feed('f','✈ MIL SCAN','No military traffic detected');
  } catch(e) {
    $('fc').textContent='N/A';
    toast('⚠ Flight data unavailable');
    setSt('FLIGHT DATA UNAVAILABLE');
  }
}
setInterval(loadFlights, 120000);

// SGP4-lite propagator (same as before)
function sgp4lite(tle1, tle2, minutesFromEpoch) {
  try {
    var inc=parseFloat(tle2.substring(8,16))*Math.PI/180;
    var raan=parseFloat(tle2.substring(17,25))*Math.PI/180;
    var eccStr=tle2.substring(26,33); var ecc=parseFloat('0.'+eccStr);
    var argp=parseFloat(tle2.substring(34,42))*Math.PI/180;
    var ma=parseFloat(tle2.substring(43,51))*Math.PI/180;
    var mm=parseFloat(tle2.substring(52,63));
    var n=mm*2*Math.PI/1440;
    var a=Math.pow(398600.4418/(n*n),1/3);
    var M=ma+n*minutesFromEpoch;
    var E=M; for(var i=0;i<10;i++) E=M+ecc*Math.sin(E);
    var nu=2*Math.atan2(Math.sqrt(1+ecc)*Math.sin(E/2),Math.sqrt(1-ecc)*Math.cos(E/2));
    var r=a*(1-ecc*Math.cos(E));
    var x=r*(Math.cos(raan)*Math.cos(argp+nu)-Math.sin(raan)*Math.sin(argp+nu)*Math.cos(inc));
    var y=r*(Math.sin(raan)*Math.cos(argp+nu)+Math.cos(raan)*Math.sin(argp+nu)*Math.cos(inc));
    var z=r*(Math.sin(inc)*Math.sin(argp+nu));
    var gmst=(280.46061837+360.98564736629*(minutesFromEpoch/1440))*Math.PI/180;
    var xe=x*Math.cos(gmst)+y*Math.sin(gmst);
    var ye=-x*Math.sin(gmst)+y*Math.cos(gmst);
    var lat=Math.atan2(z,Math.sqrt(xe*xe+ye*ye))*180/Math.PI;
    var lon=Math.atan2(ye,xe)*180/Math.PI;
    var alt=r-6371;
    return {lat:lat,lon:lon,alt:alt};
  } catch(e){ return null; }
}

function parseTLEEpoch(tle1) {
  var epochStr = tle1.substring(18,32).trim();
  var yr = parseInt(epochStr.substring(0,2));
  var fullYr = yr < 57 ? 2000+yr : 1900+yr;
  var dayOfYr = parseFloat(epochStr.substring(2));
  var d = new Date(fullYr, 0, 1);
  d.setDate(d.getDate() + Math.floor(dayOfYr) - 1);
  d.setMilliseconds(((dayOfYr % 1) * 86400000));
  return d;
}

async function fetchTLE(name, key) {
  // Try multiple TLE sources and proxies
  var celestrakUrl = 'https://celestrak.org/NORAD/elements/gp.php?NAME='+encodeURIComponent(name)+'&FORMAT=tle';
  // celestrak also has a direct JSON endpoint that works better
  var celestrakJson = 'https://celestrak.org/NORAD/elements/gp.php?NAME='+encodeURIComponent(name)+'&FORMAT=json';

  var sources = [
    // Direct celestrak first — works on localhost and sometimes live
    celestrakUrl,
    // corsproxy with different URL format
    'https://corsproxy.io/?'+encodeURIComponent(celestrakUrl),
    // thingproxy
    'https://thingproxy.freeboard.io/fetch/'+celestrakUrl,
    // codetabs with correct param name
    'https://api.codetabs.com/v1/proxy/?quest='+encodeURIComponent(celestrakUrl),
    'https://api.allorigins.win/raw?url='+encodeURIComponent(celestrakUrl),
  ];

  for (var i=0; i<sources.length; i++) {
    try {
      var r = await fetch(sources[i]);
      if (!r.ok) continue;
      var text = await r.text();
      // Handle allorigins JSON wrapper
      if (text.startsWith('{') && text.includes('contents')) {
        try { text = JSON.parse(text).contents; } catch(e) {}
      }
      if (text && text.length > 20 && (text.includes('1 ') || text.includes('2 '))) {
        return text;
      }
    } catch(e) {}
  }
  return null;
}

function parseTLEs(text) {
  var lines = text.split('\n').map(function(l){ return l.trim(); }).filter(function(l){ return l.length>0; });
  var tles = [];
  for (var i=0; i<lines.length-2; i++) {
    if (lines[i+1].startsWith('1 ') && lines[i+2].startsWith('2 ')) {
      tles.push({name:lines[i], tle1:lines[i+1], tle2:lines[i+2]});
      i+=2;
    }
  }
  return tles;
}

async function loadSatellites() {
  setSt('LOADING SATELLITE TLE DATA...');
  clearLayer('sat');
  tleData = {};
  var now = new Date();
  var loaded = 0;

  for (var ci=0; ci<CONSTELLATIONS.length; ci++) {
    var con = CONSTELLATIONS[ci];
    var searchName = con.type === 'group' ? con.key.toUpperCase() : con.key;
    var text = await fetchTLE(searchName, con.key);
    if (!text) continue;
    var tles = parseTLEs(text);
    var count = 0;
    var max = con.max || 30;
    for (var ti=0; ti<tles.length && count<max; ti++) {
      var tle = tles[ti];
      var epoch = parseTLEEpoch(tle.tle1);
      var mins = (now - epoch) / 60000;
      var pos = sgp4lite(tle.tle1, tle.tle2, mins);
      if (!pos || Math.abs(pos.lat)>85) continue;
      var el = mkDotEl(con.color, 7);
      var popup = mkPop(con.color, '🛰 '+tle.name.trim(), [
        ['NATION',  con.nation],
        ['FUNC',    con.func],
        ['ALT',     Math.round(pos.alt)+'km'],
        ['LAT',     pos.lat.toFixed(2)+'°'],
        ['LON',     pos.lon.toFixed(2)+'°'],
      ]);
      addMarker('sat', [pos.lon, pos.lat], el, popup);
      tleData[tle.name.trim()] = {tle1:tle.tle1, tle2:tle.tle2, color:con.color, nation:con.nation, func:con.func};
      count++;
    }
    loaded += count;
  }

  $('sc').textContent = loaded||'0';
  setSt('TRACKING '+loaded+' ISR SATELLITES');
  feed('sat','🛰 SATELLITES', loaded+' ISR/recon birds loaded');
}

function renderSatellites() {
  if (!vis.sat) return;
  var now = new Date();
  clearLayer('sat');
  var count = 0;
  Object.keys(tleData).forEach(function(name) {
    var d = tleData[name];
    var epoch = parseTLEEpoch(d.tle1);
    var mins = (now - epoch) / 60000;
    var pos = sgp4lite(d.tle1, d.tle2, mins);
    if (!pos || Math.abs(pos.lat)>85) return;
    var el = mkDotEl(d.color, 7);
    var popup = mkPop(d.color, '🛰 '+name, [
      ['NATION', d.nation],
      ['FUNC',   d.func],
      ['ALT',    Math.round(pos.alt)+'km'],
      ['LAT',    pos.lat.toFixed(2)+'°'],
      ['LON',    pos.lon.toFixed(2)+'°'],
    ]);
    addMarker('sat', [pos.lon, pos.lat], el, popup);
    count++;
  });
  $('sc').textContent = count||'0';
}
setInterval(renderSatellites, 30000);
