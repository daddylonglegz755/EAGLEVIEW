  <!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EAGLE VIEW // LIVE</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
:root {
  --bg:     #030912;
  --panel:  rgba(3,10,24,0.97);
  --border: rgba(0,200,255,0.13);
  --cyan:   #00d4ff;
  --green:  #00ff99;
  --amber:  #ffb300;
  --purple: #bb55ff;
  --red:    #ff3355;
  --dim:    rgba(255,255,255,0.25);
}
html, body { height:100%; overflow:hidden; background:var(--bg); font-family:'Share Tech Mono',monospace; color:var(--cyan); }

/* HEADER */
#hdr {
  position:fixed; top:0; left:0; right:0; height:50px;
  background:rgba(2,6,16,0.99); border-bottom:1px solid var(--border);
  display:flex; align-items:center; justify-content:space-between;
  padding:0 20px; z-index:3000;
}
.logo { font-family:'Orbitron',monospace; font-weight:900; font-size:18px; letter-spacing:5px; color:var(--cyan); text-shadow:0 0 22px rgba(0,212,255,.45); }
.logo em { color:var(--green); font-style:normal; }
.live-badge { display:flex; align-items:center; gap:7px; font-size:10px; letter-spacing:3px; color:var(--red); }
.live-dot { width:7px; height:7px; border-radius:50%; background:var(--red); box-shadow:0 0 9px var(--red); animation:blink 1.3s infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.25} }
.hstats { display:flex; gap:22px; }
.hs { text-align:center; }
.hs-v { font-family:'Orbitron',monospace; font-size:15px; font-weight:700; }
.hs-v.f   { color:var(--amber); }
.hs-v.s   { color:var(--cyan); }
.hs-v.sat { color:var(--purple); }
.hs-l { font-size:9px; color:var(--dim); letter-spacing:2px; margin-top:2px; }

/* LAYOUT */
#layout { position:fixed; top:50px; bottom:28px; left:0; right:0; display:flex; }

/* SIDEBAR */
#sidebar {
  width:215px; flex-shrink:0;
  background:var(--panel); border-right:1px solid var(--border);
  display:flex; flex-direction:column; z-index:1000; overflow:hidden;
}
.sb-block { padding:13px 14px; border-bottom:1px solid var(--border); flex-shrink:0; }
.sb-lbl { font-size:9px; letter-spacing:3px; color:rgba(255,255,255,.2); margin-bottom:10px; }

.lbtn {
  display:flex; align-items:center; gap:9px; width:100%;
  padding:8px 10px; margin-bottom:5px;
  background:transparent; border:1px solid transparent; border-radius:4px;
  cursor:pointer; font-family:'Share Tech Mono',monospace; font-size:11px;
  letter-spacing:1px; color:rgba(255,255,255,.35); text-align:left; transition:all .18s;
}
.lbtn.on  { border-color:var(--border); background:rgba(0,212,255,.05); color:#fff; }
.lbtn:hover { background:rgba(255,255,255,.04); color:#ddd; }
.ldot { width:9px; height:9px; border-radius:50%; flex-shrink:0; }
.lsym { font-size:13px; width:18px; text-align:center; flex-shrink:0; line-height:1; }
.ldot.f   { background:var(--amber);  box-shadow:0 0 6px var(--amber); }
.ldot.s   { background:var(--cyan);   box-shadow:0 0 6px var(--cyan); }
.ldot.sat { background:var(--purple); box-shadow:0 0 6px var(--purple); }
.ldot.nuc { background:#ffff00;  box-shadow:0 0 6px #ffff00; }
.ldot.rad { background:#ff2200;  box-shadow:0 0 6px #ff2200; }
.ldot.mil { background:#00ff99;  box-shadow:0 0 6px #00ff99; }
.ldot.emb { background:#44aaff;  box-shadow:0 0 6px #44aaff; }

.row-btns { display:flex; gap:6px; margin-top:7px; }
.rbtn {
  flex:1; padding:7px 4px; text-align:center;
  background:rgba(0,212,255,.06); border:1px solid var(--border); border-radius:3px;
  color:var(--cyan); font-family:'Share Tech Mono',monospace; font-size:9px;
  letter-spacing:1px; cursor:pointer; transition:all .18s;
}
.rbtn:hover { background:rgba(0,212,255,.15); }

/* Map style selector */
.style-btns { display:flex; flex-direction:column; gap:4px; }
.sbtn {
  width:100%; padding:6px 10px;
  background:rgba(255,255,255,.03); border:1px solid transparent; border-radius:3px;
  color:rgba(255,255,255,.32); font-family:'Share Tech Mono',monospace;
  font-size:9px; letter-spacing:1px; cursor:pointer; transition:all .18s; text-align:left;
}
.sbtn:hover  { background:rgba(255,255,255,.07); color:#fff; }
.sbtn.active { background:rgba(0,212,255,.1); color:var(--cyan); border-color:var(--border); }

/* Feed */
#feed { flex:1; overflow-y:auto; padding:10px 13px; min-height:0; }
#feed::-webkit-scrollbar { width:2px; }
#feed::-webkit-scrollbar-thumb { background:rgba(0,212,255,.15); }
.fi { padding:7px 0; border-bottom:1px solid rgba(255,255,255,.04); animation:fdin .3s; }
@keyframes fdin { from{opacity:0;transform:translateX(-4px)} to{opacity:1;transform:none} }
.fi-cs { font-family:'Orbitron',monospace; font-size:10px; font-weight:700; }
.fi.f   .fi-cs { color:var(--amber); }
.fi.s   .fi-cs { color:var(--cyan); }
.fi.sat .fi-cs { color:var(--purple); }
.fi.mil .fi-cs { color:var(--green); }
.fi.emb .fi-cs { color:#44aaff; }
.fi-dt { font-size:9px; color:rgba(255,255,255,.28); margin-top:2px; }

/* MAP */
#map-wrap { flex:1; position:relative; }
#map { position:absolute; inset:0; background:#030912; }

/* Dark tile filter */
.leaflet-tile-pane {
  filter: brightness(0.75) saturate(0.6) hue-rotate(175deg);
}

/* Scanlines */
#map-wrap::after {
  content:''; position:absolute; inset:0; pointer-events:none; z-index:400;
  background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,.03) 3px,rgba(0,0,0,.03) 4px);
}

/* Coord HUD */
#coord-hud {
  position:absolute; bottom:10px; left:50%; transform:translateX(-50%);
  font-size:10px; letter-spacing:2px; color:rgba(0,212,255,.4);
  z-index:500; pointer-events:none; white-space:nowrap;
  background:rgba(3,10,24,.7); padding:4px 10px; border-radius:3px;
}

/* STATUS BAR */
#statusbar {
  position:fixed; bottom:0; left:0; right:0; height:28px;
  background:rgba(2,6,16,.99); border-top:1px solid var(--border);
  display:flex; align-items:center; justify-content:space-between;
  padding:0 18px; font-size:10px; color:var(--dim); letter-spacing:1px; z-index:3000;
}
.sbr { display:flex; gap:20px; }

/* LOADER */
#loader {
  position:absolute; inset:0; background:rgba(3,9,18,.92);
  display:flex; flex-direction:column; align-items:center; justify-content:center; gap:13px;
  z-index:800; transition:opacity .6s;
}
#loader.gone { opacity:0; pointer-events:none; }
.spin { width:46px; height:46px; border:2px solid rgba(0,212,255,.08); border-top-color:var(--cyan); border-radius:50%; animation:spin .72s linear infinite; }
@keyframes spin { to{transform:rotate(360deg)} }
.lt { font-family:'Orbitron',monospace; font-size:11px; letter-spacing:3px; color:var(--cyan); }
.ls { font-size:9px; color:rgba(255,255,255,.25); letter-spacing:1px; }

/* TOAST */
#toast {
  position:absolute; bottom:40px; left:50%; transform:translateX(-50%);
  background:rgba(255,51,85,.1); border:1px solid rgba(255,51,85,.28);
  border-radius:4px; padding:8px 18px; font-size:10px; color:var(--red);
  letter-spacing:1px; z-index:600; display:none; white-space:nowrap;
}

/* Leaflet popup */
.leaflet-popup-content-wrapper {
  background:rgba(3,10,24,.97) !important;
  border:1px solid var(--border) !important;
  border-radius:4px !important; color:#fff !important;
  font-family:'Share Tech Mono',monospace !important;
  font-size:11px !important;
  box-shadow:0 0 20px rgba(0,212,255,.12) !important;
}
.leaflet-popup-tip { background:rgba(3,10,24,.97) !important; }
.leaflet-popup-close-button { color:rgba(255,255,255,.4) !important; font-size:16px !important; top:6px !important; right:8px !important; }
.pop-title { font-family:'Orbitron',monospace; font-size:12px; font-weight:700; margin-bottom:8px; padding-bottom:6px; border-bottom:1px solid var(--border); }
.pop-row { display:flex; justify-content:space-between; gap:14px; padding:2px 0; }
.pop-row span:first-child { color:rgba(255,255,255,.38); }

/* Mobile responsive */
@media (max-width: 700px) {
  #hamburger { display:block !important; }
  #sidebar {
    position:fixed; top:50px; left:0; bottom:28px;
    transform:translateX(-100%);
    transition:transform .25s ease;
    z-index:2000;
    width:230px !important;
  }
  #sidebar.open { transform:translateX(0); }
  #sidebar-overlay {
    display:none; position:fixed; inset:0; top:50px;
    background:rgba(0,0,0,0.5); z-index:1999;
  }
  #sidebar-overlay.open { display:block; }
  .logo { font-size:14px; letter-spacing:3px; }
  .hs-v { font-size:12px; }
  .hstats { gap:12px; }
}

/* Leaflet controls */
.leaflet-control-zoom a {
  background:rgba(3,10,24,.97) !important;
  border-color:var(--border) !important;
  color:var(--cyan) !important;
  font-size:16px !important;
}
.leaflet-control-zoom a:hover { background:rgba(0,212,255,.12) !important; }
.leaflet-control-attribution {
  background:rgba(3,10,24,.8) !important;
  color:rgba(255,255,255,.2) !important;
  font-size:9px !important;
}
.leaflet-control-attribution a { color:rgba(0,212,255,.4) !important; }
</style>
</head>
<body>

<div id="hdr">
  <button id="hamburger" onclick="toggleSidebar()" style="
    display:none; background:none; border:1px solid var(--border);
    border-radius:4px; padding:6px 9px; cursor:pointer;
    color:var(--cyan); font-size:16px; line-height:1; margin-right:10px;
  ">☰</button>
  <div class="logo">EAGLE<em>VIEW</em></div>
  <div class="live-badge"><div class="live-dot"></div>LIVE</div>
  <div class="hstats">
    <div class="hs"><div class="hs-v f"   id="fc">—</div><div class="hs-l">MIL AIRCRAFT</div></div>
    <div class="hs"><div class="hs-v sat" id="satc">—</div><div class="hs-l">SATELLITES</div></div>
  </div>
</div>

<div id="layout">
  <div id="sidebar">
    <div class="sb-block">
      <div class="sb-lbl">// LAYERS</div>
      <button class="lbtn on" id="lb-f"   onclick="toggleLayer('f')">  <span class="lsym" style="color:#00ff99;">✈</span>MIL AIRCRAFT</button>
      <button class="lbtn on" id="lb-sat" onclick="toggleLayer('sat')"><span class="lsym" style="color:#bb55ff;">●</span>SATELLITES</button>
      <button class="lbtn on" id="lb-nuc" onclick="toggleLayer('nuc')"><span class="lsym" style="color:#ffff00;">☢</span>NUCLEAR</button>
      <button class="lbtn on" id="lb-rad" onclick="toggleLayer('rad')"><span class="lsym" style="color:#ff2200;">📡</span>RADAR SITES</button>
      <button class="lbtn on" id="lb-mil" onclick="toggleLayer('mil')"><span class="lsym" style="color:#00ff99;">★</span>MIL BASES</button>
      <div class="row-btns">
        <button class="rbtn" onclick="refreshAll()">↻ REFRESH</button>
        <button class="rbtn" onclick="map.setView([20,10],2)">⊙ RESET</button>
      </div>
    </div>

    <div class="sb-block">
      <div class="sb-lbl">// MAP STYLE</div>
      <div class="style-btns">
        <button class="sbtn active" id="ms-dark"   onclick="setStyle('dark')">  ◼ DARK</button>
        <button class="sbtn"        id="ms-sat"    onclick="setStyle('sat')">   🛰 SATELLITE</button>
        <button class="sbtn"        id="ms-topo"   onclick="setStyle('topo')">  ▲ TERRAIN</button>
        <button class="sbtn"        id="ms-street" onclick="setStyle('street')">🗺 STREET</button>
      </div>
    </div>

    <div class="sb-block" style="padding:11px 14px;">
      <div class="sb-lbl">// SOURCES</div>
      <div style="font-size:10px;color:rgba(255,255,255,.24);line-height:2.1;">
        ✈ <a href="https://opensky-network.org" target="_blank" style="color:var(--amber);text-decoration:none;">OpenSky Network</a><br>
        🛰 <a href="https://celestrak.org"       target="_blank" style="color:var(--purple);text-decoration:none;">CelesTrak TLE</a><br>
        ☢ <a href="https://github.com/cristianst85/GeoNuclearData" target="_blank" style="color:#ffff00;text-decoration:none;">GeoNuclearData</a><br>
        📡 <a href="https://www.openstreetmap.org" target="_blank" style="color:#ff4400;text-decoration:none;">OSINT / OpenStreetMap</a>
      </div>
    </div>

    <div class="sb-block" style="padding:11px 14px;">
      <div class="sb-lbl">// CONSTELLATION KEY</div>
      <div id="sat-legend"></div>
    </div>
    <div id="feed"><div class="sb-lbl" style="padding:10px 0 2px;">// LIVE FEED</div></div>
  </div>
  <div id="sidebar-overlay" onclick="toggleSidebar()"></div>

  <div id="map-wrap">
    <div id="map"></div>
    <div id="coord-hud">LAT — &nbsp; LON —</div>
    <div id="loader">
      <div class="spin"></div>
      <div class="lt">ACQUIRING SIGNAL</div>
      <div class="ls">LOADING DATA SOURCES...</div>
    </div>
    <div id="toast"></div>
  </div>
</div>

<div id="statusbar">
  <span id="smsg">INITIALIZING GLOBALTRACK</span>
  <div class="sbr">
    <span id="clock">--:--:-- UTC</span>
    <span id="lupd">LAST UPDATE: —</span>
  </div>
</div>

<script>
// ── ALL VARS UP FRONT ────────────────────────────────────────────────────────
var TAU = 2 * Math.PI;
var D2R = Math.PI / 180;
var R2D = 180 / Math.PI;

var layers = { f: L.layerGroup(), sat: L.layerGroup(), nuc: L.layerGroup(), rad: L.layerGroup(), mil: L.layerGroup(), emb: L.layerGroup() };
var vis    = { f:true, sat:true, nuc:true, rad:true, mil:true, emb:true };
var baseLayer = null;

// ── MAP INIT ─────────────────────────────────────────────────────────────────
var isMobile = ('ontouchstart' in window || navigator.maxTouchPoints > 0);
var map = L.map('map', {
  center: [20, 10], zoom: 2,
  zoomControl: false,
  attributionControl: true,
  worldCopyJump: false,
  maxBoundsViscosity: 1.0,
  maxBounds: [[-90, -180], [90, 180]],
  minZoom: 2,
  preferCanvas: true,
  tap: false,
});

L.control.zoom({ position:'bottomright' }).addTo(map);

// Tile layers
var tileLayers = {
  dark: L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    attribution:'© OpenStreetMap © CARTO', subdomains:'abcd', maxZoom:19
  }),
  sat: L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
    attribution:'© Esri', maxZoom:19
  }),
  topo: L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png', {
    attribution:'© OpenTopoMap', maxZoom:17
  }),
  street: L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution:'© OpenStreetMap', maxZoom:19
  }),
};

// Start with dark
baseLayer = tileLayers.dark;
baseLayer.addTo(map);

// Add data layers
layers.f.addTo(map);
layers.sat.addTo(map);
layers.nuc.addTo(map);
layers.rad.addTo(map);
layers.mil.addTo(map);
layers.emb.addTo(map);


// ── MAP STYLE SWITCHER ───────────────────────────────────────────────────────
var currentStyle = 'dark';
function setStyle(name) {
  map.removeLayer(baseLayer);
  baseLayer = tileLayers[name];
  map.addLayer(baseLayer);
  baseLayer.bringToBack();
  // Tile filter: only apply darkening to non-satellite styles
  var pane = document.querySelector('.leaflet-tile-pane');
  if (name === 'sat') {
    pane.style.filter = 'brightness(0.75) saturate(0.8)';
  } else if (name === 'dark') {
    pane.style.filter = 'brightness(0.75) saturate(0.6) hue-rotate(175deg)';
  } else {
    pane.style.filter = 'brightness(0.45) saturate(0.55)';
  }
  currentStyle = name;
  document.querySelectorAll('.sbtn').forEach(function(b){ b.classList.remove('active'); });
  document.getElementById('ms-'+name).classList.add('active');
}

// Coord on mouse move
map.on('mousemove', function(e) {
  document.getElementById('coord-hud').textContent =
    'LAT ' + e.latlng.lat.toFixed(4) + '°   LON ' + e.latlng.lng.toFixed(4) + '°';
});

// ── UTILITIES ────────────────────────────────────────────────────────────────
function $(id) { return document.getElementById(id); }
function setSt(t) { $('smsg').textContent = t; }
function setLU() {
  var n = new Date();
  $('lupd').textContent = 'LAST UPDATE: ' + n.toUTCString().slice(17,25) + ' UTC';
}
function toast(msg, ms) {
  var t=$('toast'); t.textContent=msg; t.style.display='block';
  setTimeout(function(){ t.style.display='none'; }, ms||5500);
}
function feed(type, title, detail) {
  var f=$('feed'), d=document.createElement('div');
  d.className='fi '+type;
  d.innerHTML='<div class="fi-cs">'+title+'</div><div class="fi-dt">'+detail+'</div>';
  // Always prepend right after the label header
  var h=f.querySelector('.sb-lbl');
  if (h && h.parentNode === f) {
    h.insertAdjacentElement('afterend', d);
  } else {
    f.insertBefore(d, f.firstChild);
  }
  var all=f.querySelectorAll('.fi');
  if(all.length>60) all[all.length-1].remove();
}
function mkPop(color, title, rows) {
  var html='<div class="pop-title" style="color:'+color+'">'+title+'</div>';
  rows.forEach(function(r){
    html+='<div class="pop-row"><span>'+r[0]+'</span><span>'+r[1]+'</span></div>';
  });
  return html;
}

setInterval(function(){
  var n=new Date(), p=function(x){return String(x).padStart(2,'0');};
  $('clock').textContent=p(n.getUTCHours())+':'+p(n.getUTCMinutes())+':'+p(n.getUTCSeconds())+' UTC';
}, 1000);

// ── LAYER TOGGLES ────────────────────────────────────────────────────────────
function toggleLayer(k) {
  vis[k] = !vis[k];
  if (vis[k]) { map.addLayer(layers[k]); }
  else         { map.removeLayer(layers[k]); }
  $('lb-'+k).classList.toggle('on', vis[k]);
}

// ── ICONS ────────────────────────────────────────────────────────────────────
function mkIcon(color, glyph, rot) {
  return L.divIcon({
    html: '<div style="color:'+color+';font-size:13px;transform:rotate('+(rot||0)+'deg);filter:drop-shadow(0 0 3px '+color+');line-height:1;">'+glyph+'</div>',
    className:'', iconSize:[16,16], iconAnchor:[8,8]
  });
}
function mkIconSm(color, glyph) {
  return L.divIcon({
    html: '<div style="color:'+color+';font-size:11px;font-family:monospace;filter:drop-shadow(0 0 4px '+color+');line-height:1;font-style:normal;">'+glyph+'</div>',
    className:'', iconSize:[12,12], iconAnchor:[6,6]
  });
}

// ── FLIGHTS ──────────────────────────────────────────────────────────────────
async function safeFetch(url) {
  var r = await fetch(url);
  if(!r.ok) throw new Error('HTTP '+r.status);
  return JSON.parse(await r.text());
}

async function fetchFallback(url) {
  var proxies = [
    function(u){ return 'https://corsproxy.io/?'+encodeURIComponent(u); },
    function(u){ return 'https://api.allorigins.win/raw?url='+encodeURIComponent(u); },
    function(u){ return 'https://thingproxy.freeboard.io/fetch/'+u; },
    function(u){ return 'https://api.codetabs.com/v1/proxy?quest='+encodeURIComponent(u); },
  ];
  try { return await safeFetch(url, 8000); } catch(e){}
  for (var i=0; i<proxies.length; i++) {
    try { return await safeFetch(proxies[i](url), 14000); } catch(e){}
  }
  throw new Error('All sources failed');
}

// ── MILITARY AIRCRAFT FILTER ─────────────────────────────────────────────────
var MIL_ICAO_PREFIXES = [
  'ae',                                      // US DoD — all AE**** = US military
  'a97','a98','a99','a9a','a9b','a9c','a9d','a9e','a9f',
  '43c','43d','43e',                         // UK military
  '3f4','3f5',                               // German Luftwaffe
  '3010','3011','3012','3013',               // French Armée de l'Air
  '7c0','7c1',                               // Australian RAAF
  'c00','c01','c02',                         // Canadian Armed Forces
  '4960','4961',                             // NATO AWACS
];

var MIL_CALLSIGNS = [
  'RCH','CNV','REACH','FORTE','OLIVE','JAKE','SPRY',  // ISR/airlift
  'NIGHT','KING','PASTA','ASCOT','TARTAN','QUID',      // RAF/USAF
  'VANCE','INDY','SPOOKY','SLAYER','DRAGON','COBRA',   // tankers/gunships
  'VIPER','EAGLE','RAPTOR','GHOST','BLADE','ROCKY',
  'MOOSE','HUNT','TOPCAT','HOMER','DUKE','DAGGER',
  'SABER','LANCE','SPARTAN','TITAN','FURY','MAGNUM',
  'STALLION','WOLF','BEAR','LION','TIGER','HAWK',
  'FALCON','RAM','SLAM','BISON','BUCK','STEEL','IRON',
  'GOLD','SILVER','BRONZE','COPPER','NAVY','USMC',
  'JANET','SPAR','SAM','EXEC','PAT','GAF','BAF','NATO',
  'VENUS','SCOTT','NOTOS','TEAL','BRASS',
];

function isMilitary(icao24, callsign) {
  var hex = (icao24||'').toLowerCase().trim();
  var cs  = (callsign||'').toUpperCase().trim();
  for (var i=0; i<MIL_ICAO_PREFIXES.length; i++) {
    if (hex.startsWith(MIL_ICAO_PREFIXES[i])) return true;
  }
  for (var j=0; j<MIL_CALLSIGNS.length; j++) {
    if (cs.startsWith(MIL_CALLSIGNS[j])) return true;
  }
  if (/^CG\d/.test(cs)) return true;   // Coast Guard
  if (/^AF[12]/.test(cs)) return true; // Air Force One/Two
  return false;
}

function getMilType(callsign) {
  var cs = (callsign||'').toUpperCase();
  if (/FORTE|OLIVE|SPRY|JAKE|DRAGON/.test(cs)) return 'ISR/SIGINT';
  if (/QUID|VANCE|INDY/.test(cs))              return 'Tanker';
  if (/SPOOKY|SLAYER/.test(cs))                return 'Gunship';
  if (/^SAM\d|^SPAR\d|^AF[12]|EXEC/.test(cs)) return 'VIP Transport';
  if (/^CG\d/.test(cs))                        return 'Coast Guard';
  if (/^NAVY|^NAVAL/.test(cs))                 return 'US Navy';
  if (/^USMC/.test(cs))                        return 'USMC';
  if (/JANET/.test(cs))                        return 'Special Mission';
  if (/^RCH|^CNV/.test(cs))                   return 'AMC Airlift';
  return 'Military';
}

async function fetchTLEGroup(con) {
  var base = 'https://celestrak.org/NORAD/elements/gp.php';
  var url  = con.type === 'group'
    ? base + '?GROUP=' + con.key + '&FORMAT=tle'
    : base + '?NAME='  + encodeURIComponent(con.key) + '&FORMAT=tle';
  var proxies = [
    'https://api.allorigins.win/raw?url=',
    'https://corsproxy.io/?',
  ];
  var text = null;
  try {
    var r = await fetch(url);
    if (r.ok) text = await r.text();
  } catch(e) {}
  if (!text || text.length < 20) {
    for (var i = 0; i < proxies.length; i++) {
      try {
        var r2 = await fetch(proxies[i] + encodeURIComponent(url));
        if (r2.ok) { text = await r2.text(); if (text && text.length > 20) break; }
      } catch(e) {}
    }
  }
  if (!text || text.length < 20) return [];
  // Parse 3-line TLE sets
  var lines = text.split('\n').map(function(l){ return l.trim(); }).filter(function(l){ return l.length > 0; });
  var tles = [];
  for (var i = 0; i < lines.length; i++) {
    if (lines[i+1] && lines[i+1].charAt(0) === '1' && lines[i+2] && lines[i+2].charAt(0) === '2') {
      tles.push({ name: lines[i].replace(/^0 /, '').trim(), l1: lines[i+1], l2: lines[i+2] });
      i += 2;
    }
  }
  return tles;
}

async function loadAllTLEs() {
  ALL_TLES = [];
  var total = 0;
  for (var ci = 0; ci < CONSTELLATIONS.length; ci++) {
    var con = CONSTELLATIONS[ci];
    setSt('LOADING ' + con.label + '...');
    try {
      var tles = await fetchTLEGroup(con);
      var subset = tles.slice(0, con.max);
      subset.forEach(function(t) {
        ALL_TLES.push({ name:t.name, l1:t.l1, l2:t.l2, color:con.color, nation:con.nation, label:con.label, func:con.func });
      });
      total += subset.length;
      $('satc').textContent = total;
      if (subset.length > 0) feed('sat', '🛰 ' + con.label, con.nation + ' · ' + subset.length + ' sats · ' + con.func);
    } catch(e) {
      console.warn('Constellation failed: ' + con.label, e);
    }
  }
  return total;
}

function sgp4lite(l1, l2) {
  var inc  = parseFloat(l2.substring(8,16)),  raan = parseFloat(l2.substring(17,25));
  var ecc  = parseFloat('0.'+l2.substring(26,33).trim()), argp = parseFloat(l2.substring(34,42));
  var ma   = parseFloat(l2.substring(43,51)), mm   = parseFloat(l2.substring(52,63));
  var ey   = parseInt(l1.substring(18,20)),   ed   = parseFloat(l1.substring(20,32));
  var fy   = ey < 57 ? 2000+ey : 1900+ey;
  var eMs  = Date.UTC(fy,0,1) + (ed-1)*86400000;
  var dt   = (Date.now()-eMs)/60000, n = mm*TAU/1440;
  var M    = ((ma*D2R)+n*dt) % TAU; if (M<0) M+=TAU;
  var E    = M;
  for (var i=0;i<8;i++) E -= (E - ecc*Math.sin(E) - M) / (1 - ecc*Math.cos(E));
  var nu   = 2*Math.atan2(Math.sqrt(1+ecc)*Math.sin(E/2), Math.sqrt(1-ecc)*Math.cos(E/2));
  var u    = nu+argp*D2R, I = inc*D2R, RA = raan*D2R;
  var x    = Math.cos(RA)*Math.cos(u) - Math.sin(RA)*Math.sin(u)*Math.cos(I);
  var y    = Math.sin(RA)*Math.cos(u) + Math.cos(RA)*Math.sin(u)*Math.cos(I);
  var z    = Math.sin(u)*Math.sin(I);
  var jd   = Date.now()/86400000 + 2440587.5;
  var gmst = ((280.46061837 + 360.98564736629*(jd-2451545.0)) % 360) * D2R;
  var lat  = Math.asin(Math.max(-1,Math.min(1,z))) * R2D;
  var lon  = (Math.atan2(y,x) - gmst) * R2D;
  while (lon>180) lon-=360; while (lon<-180) lon+=360;
  var a    = Math.cbrt(398600.4418 / Math.pow(mm*TAU/86400, 2));
  return { lat:lat, lon:lon, alt:Math.round(a-6371) };
}

function groundTrack(l1, l2) {
  var inc  = parseFloat(l2.substring(8,16)),  raan = parseFloat(l2.substring(17,25));
  var ecc  = parseFloat('0.'+l2.substring(26,33).trim()), argp = parseFloat(l2.substring(34,42));
  var ma   = parseFloat(l2.substring(43,51)), mm   = parseFloat(l2.substring(52,63));
  var ey   = parseInt(l1.substring(18,20)),   ed   = parseFloat(l1.substring(20,32));
  var fy   = ey < 57 ? 2000+ey : 1900+ey;
  var eMs  = Date.UTC(fy,0,1) + (ed-1)*86400000;
  var n    = mm*TAU/1440, I = inc*D2R, RA = raan*D2R;
  var pts  = [];
  for (var s=0; s<=80; s++) {
    var fMs = Date.now() + s*(90/80)*60000;
    var dt  = (fMs-eMs)/60000;
    var M   = ((ma*D2R)+n*dt) % TAU; if (M<0) M+=TAU;
    var E   = M;
    for (var i=0;i<5;i++) E -= (E - ecc*Math.sin(E) - M) / (1 - ecc*Math.cos(E));
    var nu  = 2*Math.atan2(Math.sqrt(1+ecc)*Math.sin(E/2), Math.sqrt(1-ecc)*Math.cos(E/2));
    var u   = nu+argp*D2R;
    var x   = Math.cos(RA)*Math.cos(u) - Math.sin(RA)*Math.sin(u)*Math.cos(I);
    var y   = Math.sin(RA)*Math.cos(u) + Math.cos(RA)*Math.sin(u)*Math.cos(I);
    var z   = Math.sin(u)*Math.sin(I);
    var jd  = fMs/86400000 + 2440587.5;
    var gmst= ((280.46061837 + 360.98564736629*(jd-2451545.0)) % 360) * D2R;
    var lat = Math.asin(Math.max(-1,Math.min(1,z))) * R2D;
    var lon = (Math.atan2(y,x) - gmst) * R2D;
    while (lon>180) lon-=360; while (lon<-180) lon+=360;
    pts.push([lat,lon]);
  }
  return pts;
}

function footprintCircle(lat, lon, altKm) {
  var Re=6371, angRad=Math.acos(Re/(Re+altKm)), radKm=Re*angRad;
  var latDeg=radKm/111.32, pts=[];
  for (var a=0; a<360; a+=5) {
    var aRad=a*D2R;
    pts.push([lat + latDeg*Math.cos(aRad), lon + latDeg*Math.sin(aRad)/Math.cos(lat*D2R)]);
  }
  return pts;
}

function renderSatellites() {
  layers.sat.clearLayers();
  var n = 0;
  ALL_TLES.forEach(function(item) {
    try {
      var p = sgp4lite(item.l1, item.l2);
      if (!isFinite(p.lat)||!isFinite(p.lon)||!isFinite(p.alt)||p.alt<0||p.alt>45000) return;
      var orb  = p.alt>30000 ? 'GEO' : p.alt>1000 ? 'MEO' : 'LEO';
      var col  = item.color;

      // Ground track — only show on click, hidden by default (disabled on mobile)
      var trackLines = [];
      if (p.alt < 2500 && !isMobile) {
        var track = groundTrack(item.l1, item.l2);
        var seg=[], segs=[seg];
        for (var i=0; i<track.length; i++) {
          if (i>0 && Math.abs(track[i][1]-track[i-1][1])>180) { seg=[]; segs.push(seg); }
          seg.push(track[i]);
        }
        segs.forEach(function(sg) {
          if (sg.length<2) return;
          var pl = L.polyline(sg, { color:col, weight:1.5, opacity:0.7, dashArray:'6 5', interactive:false });
          trackLines.push(pl);
        });
      }

      // Show track on popup open, hide on close
      (function(marker, lines, lyr) {
        marker.on('popupopen', function() {
          lines.forEach(function(l){ l.addTo(lyr); });
        });
        marker.on('popupclose', function() {
          lines.forEach(function(l){ if (lyr.hasLayer(l)) lyr.removeLayer(l); });
        });
      })(L.marker([p.lat, p.lon], { icon: mkIcon(col, '●', 0) })
        .bindPopup(mkPop(col, '🛰 ' + item.name, [
          ['CONSTELLATION', item.label],
          ['NATION',        item.nation],
          ['FUNCTION',      item.func],
          ['LAT',           p.lat.toFixed(2)+'°'],
          ['LON',           p.lon.toFixed(2)+'°'],
          ['ALTITUDE',      '~'+p.alt+' km'],
          ['ORBIT',         orb],
        ]), {maxWidth:230})
        .addTo(layers.sat), trackLines, layers.sat);

      n++;
    } catch(err) { /* skip bad TLE */ }
  });
  $('satc').textContent = n;
}

function loadRadar() {
  layers.rad.clearLayers();
  RADAR_SITES.forEach(function(s) {
    var col = s.country === 'USA' || s.country === 'USA/AU' || s.country === 'USA/UK' || s.country === 'NATO' ? '#ff4400'
            : s.country === 'Russia' ? '#ff0000'
            : s.country === 'China'  ? '#ffaa00'
            : '#ff6600';
    L.marker([s.lat, s.lon], { icon: mkIconSm(col, '📡︎') })
      .bindPopup(mkPop(col, '📡 '+s.name, [
        ['COUNTRY', s.country],
        ['TYPE',    s.type],
        ['LAT',     s.lat.toFixed(4)+'°'],
        ['LON',     s.lon.toFixed(4)+'°'],
      ]), {maxWidth:240})
      .addTo(layers.rad);
  });
  feed('rad','📡 RADAR SITES', RADAR_SITES.length+' military radar/SAM sites loaded');
  console.log('[RAD] Loaded', RADAR_SITES.length, 'radar sites');
}

function loadBases() {
  layers.mil.clearLayers();
  var counts = {USA:0, RUS:0, CHN:0, NATO:0};
  MIL_BASES.forEach(function(b) {
    var col = b.c === 'USA'  ? '#00ff99'
            : b.c === 'RUS'  ? '#ff4444'
            : b.c === 'CHN'  ? '#ffaa00'
            : '#44aaff'; // NATO/Allied
    counts[b.c] = (counts[b.c]||0) + 1;
    L.marker([b.lat, b.lon], { icon: mkIconSm(col, '★') })
      .bindPopup(mkPop(col, '★ ' + b.n, [
        ['NATION',  b.c],
        ['BRANCH',  b.b],
        ['LAT',     b.lat.toFixed(4)+'°'],
        ['LON',     b.lon.toFixed(4)+'°'],
      ]), {maxWidth:240})
      .addTo(layers.mil);
  });
  var total = MIL_BASES.length;
  feed('mil','★ MIL BASES', total+' bases — USA:'+counts.USA+' RUS:'+(counts.RUS||0)+' CHN:'+(counts.CHN||0)+' NATO:'+(counts.NATO||0));
  console.log('[MIL] Loaded', total, 'military bases');
}

function loadEmbassies() {
  layers.emb.clearLayers();

  // CIA sites — magenta
  CIA_SITES.forEach(function(s) {
    var col = s.src === 'Public' ? '#44aaff' : '#ff44aa';
    L.marker([s.lat, s.lon], { icon: mkIconSm(col, '▣') })
      .bindPopup(mkPop(col, '▣ ' + s.n, [
        ['TYPE',   s.t],
        ['SOURCE', s.src],
        ['LAT',    s.lat.toFixed(4)+'°'],
        ['LON',    s.lon.toFixed(4)+'°'],
      ]), {maxWidth:260})
      .addTo(layers.emb);
  });

  // Embassies — blue
  US_EMBASSIES.forEach(function(e) {
    L.marker([e.lat, e.lon], { icon: mkIconSm('#44aaff', '🏛︎') })
      .bindPopup(mkPop('#44aaff', '🏛 US Embassy — ' + e.n, [
        ['TYPE',  'US Embassy / Consulate'],
        ['NOTE',  'CIA station likely present'],
        ['LAT',   e.lat.toFixed(4)+'°'],
        ['LON',   e.lon.toFixed(4)+'°'],
      ]), {maxWidth:240})
      .addTo(layers.emb);
  });

  var total = CIA_SITES.length + US_EMBASSIES.length;
  feed('emb', '🏛 EMBASSIES/CIA', CIA_SITES.length+' CIA sites · '+US_EMBASSIES.length+' embassies');
  console.log('[EMB] Loaded', total, 'sites');
}

// ── BOOT ─────────────────────────────────────────────────────────────────────
(async function(){
  setTimeout(function(){ $('loader').classList.add('gone'); }, 2000);
  buildLegend();
  loadRadar();
  loadBases();
  loadEmbassies();

  setSt('LOADING SATELLITE CONSTELLATIONS FROM CELESTRAK...');
  var sn = await loadAllTLEs();
  renderSatellites();
  setSt(sn + ' SATELLITES LOADED — FETCHING FLIGHTS...');

  await loadFlights();
  $('loader').classList.add('gone'); // ensure dismissed even if timeout was slow
  loadNuclear();
  setLU();
  setSt('ALL SYSTEMS ACTIVE — ' + sn + ' SATS · FLIGHTS AUTO-REFRESH 2min');
})();
</script>
